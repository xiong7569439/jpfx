{% extends "base.html" %}

{% block title %}用户反馈 - 竞品监控仪表盘{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">用户反馈分析</h1>
    <p class="text-gray-600">分析用户评论的情感倾向与关键词</p>
</div>

<!-- 反馈统计卡片 -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-gray-500 text-sm font-medium mb-2">平均评分</h3>
        <p id="avg-rating" class="text-3xl font-bold text-yellow-500">--</p>
    </div>
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-gray-500 text-sm font-medium mb-2">正面评价</h3>
        <p id="positive-count" class="text-3xl font-bold text-green-600">--</p>
    </div>
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-gray-500 text-sm font-medium mb-2">负面评价</h3>
        <p id="negative-count" class="text-3xl font-bold text-red-600">--</p>
    </div>
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-gray-500 text-sm font-medium mb-2">评论总数</h3>
        <p id="total-reviews" class="text-3xl font-bold text-blue-600">--</p>
    </div>
</div>

<!-- 情感分布图表 -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">情感分布</h2>
        <div class="relative h-64">
            <canvas id="sentiment-chart"></canvas>
        </div>
    </div>
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">高频关键词</h2>
        <div id="keywords-cloud" class="flex flex-wrap gap-2 min-h-64 content-start">
            <!-- 动态填充 -->
        </div>
    </div>
</div>

<!-- 评论详情 -->
<div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-4">评论详情</h2>
    <div class="overflow-x-auto">
        <table class="min-w-full">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">站点</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">评分</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">情感</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">评论内容</th>
                </tr>
            </thead>
            <tbody id="reviews-tbody" class="bg-white divide-y divide-gray-200">
                <!-- 动态填充 -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let sentimentChart = null;

document.addEventListener('DOMContentLoaded', function() {
    loadReviewsData();
});

// 加载反馈数据
async function loadReviewsData() {
    try {
        const response = await fetch('/api/reviews');
        const data = await response.json();
        
        updateReviewStats(data);
        renderSentimentChart(data);
        updateKeywordsCloud(data);
        updateReviewsTable(data);
    } catch (error) {
        console.error('加载反馈数据失败:', error);
    }
}

// 更新反馈统计
function updateReviewStats(data) {
    const sentiment = data.sentiment_summary || {};
    document.getElementById('avg-rating').textContent = (sentiment.average_rating || 0).toFixed(1);
    document.getElementById('positive-count').textContent = (sentiment.sentiment_distribution || {}).positive || 0;
    document.getElementById('negative-count').textContent = (sentiment.sentiment_distribution || {}).negative || 0;
    document.getElementById('total-reviews').textContent = sentiment.total_reviews || 0;
}

// 渲染情感分布图表
function renderSentimentChart(data) {
    const ctx = document.getElementById('sentiment-chart').getContext('2d');
    const sentiment = data.sentiment_summary?.sentiment_distribution || {};
    
    if (sentimentChart) {
        sentimentChart.destroy();
    }
    
    sentimentChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['正面', '负面', '中性'],
            datasets: [{
                data: [
                    sentiment.positive || 0,
                    sentiment.negative || 0,
                    sentiment.neutral || 0
                ],
                backgroundColor: ['#10B981', '#EF4444', '#9CA3AF']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
}

// 更新关键词云
function updateKeywordsCloud(data) {
    const container = document.getElementById('keywords-cloud');
    const keywords = data.keyword_analysis?.top_keywords || [];
    
    container.innerHTML = '';
    
    if (keywords.length === 0) {
        container.innerHTML = '<p class="text-gray-500">暂无关键词数据</p>';
        return;
    }
    
    keywords.forEach(kw => {
        const span = document.createElement('span');
        span.className = 'px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm';
        span.textContent = `${kw.word} (${kw.count})`;
        container.appendChild(span);
    });
}

// 更新评论表格
function updateReviewsTable(data) {
    const tbody = document.getElementById('reviews-tbody');
    tbody.innerHTML = '';
    
    const reviewsBySite = data.reviews_by_site || {};
    let hasData = false;
    
    Object.entries(reviewsBySite).forEach(([site, reviews]) => {
        reviews.forEach(review => {
            hasData = true;
            const row = document.createElement('tr');
            
            let sentimentClass = 'text-gray-500';
            let sentimentText = '中性';
            if (review.sentiment === 'positive') {
                sentimentClass = 'text-green-600';
                sentimentText = '正面';
            } else if (review.sentiment === 'negative') {
                sentimentClass = 'text-red-600';
                sentimentText = '负面';
            }
            
            row.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${site}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${review.rating || '-'}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm ${sentimentClass}">${sentimentText}</td>
                <td class="px-6 py-4 text-sm text-gray-500 max-w-md truncate">${review.content || '-'}</td>
            `;
            tbody.appendChild(row);
        });
    });
    
    if (!hasData) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">暂无评论数据</td></tr>';
    }
}
</script>
{% endblock %}
