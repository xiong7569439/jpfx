{% extends "base.html" %}

{% block title %}价格趋势 - 竞品监控仪表盘{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">价格趋势分析</h1>
    <p class="text-gray-600">查看各游戏在不同站点的历史价格走势</p>
</div>

<!-- 筛选器 -->
<div class="bg-white rounded-lg shadow p-6 mb-8">
    <div class="flex flex-wrap gap-4 items-end">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">选择游戏</label>
            <select id="game-selector" class="border rounded px-3 py-2 w-64">
                <option value="">请选择游戏...</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">时间范围</label>
            <select id="days-selector" class="border rounded px-3 py-2 w-32">
                <option value="7">最近7天</option>
                <option value="14">最近14天</option>
                <option value="30">最近30天</option>
            </select>
        </div>
        <button id="load-btn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            加载数据
        </button>
    </div>
</div>

<!-- 价格趋势图表 -->
<div class="bg-white rounded-lg shadow p-6 mb-8">
    <h2 class="text-xl font-bold text-gray-800 mb-4">价格走势</h2>
    <div class="relative h-96">
        <canvas id="price-trend-chart"></canvas>
    </div>
</div>

<!-- 价格统计 -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-gray-500 text-sm font-medium mb-2">历史最低价</h3>
        <p id="min-price" class="text-2xl font-bold text-green-600">--</p>
        <p id="min-price-site" class="text-sm text-gray-500">--</p>
    </div>
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-gray-500 text-sm font-medium mb-2">历史最高价</h3>
        <p id="max-price" class="text-2xl font-bold text-red-600">--</p>
        <p id="max-price-site" class="text-sm text-gray-500">--</p>
    </div>
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-gray-500 text-sm font-medium mb-2">平均价格</h3>
        <p id="avg-price" class="text-2xl font-bold text-blue-600">--</p>
        <p class="text-sm text-gray-500">所有站点平均</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let priceTrendChart = null;

document.addEventListener('DOMContentLoaded', function() {
    loadGames();
    
    document.getElementById('load-btn').addEventListener('click', function() {
        const game = document.getElementById('game-selector').value;
        const days = document.getElementById('days-selector').value;
        if (game) {
            loadPriceTrendData(game, days);
        }
    });
});

// 加载游戏列表
async function loadGames() {
    try {
        const response = await fetch('/api/games');
        const games = await response.json();
        const selector = document.getElementById('game-selector');
        
        games.forEach(game => {
            const option = document.createElement('option');
            option.value = game.name;
            option.textContent = game.name;
            selector.appendChild(option);
        });
    } catch (error) {
        console.error('加载游戏列表失败:', error);
    }
}

// 加载价格趋势数据
async function loadPriceTrendData(game, days) {
    try {
        const response = await fetch(`/api/historical-data?game=${encodeURIComponent(game)}&days=${days}`);
        const data = await response.json();
        
        renderPriceTrendChart(data);
        updatePriceStats(data);
    } catch (error) {
        console.error('加载价格趋势失败:', error);
    }
}

// 渲染价格趋势图表
function renderPriceTrendChart(data) {
    const ctx = document.getElementById('price-trend-chart').getContext('2d');
    
    if (priceTrendChart) {
        priceTrendChart.destroy();
    }
    
    const dates = data.data.map(d => d.date);
    const sites = [...new Set(data.data.flatMap(d => Object.keys(d.prices)))];
    
    const datasets = sites.map((site, index) => {
        const colors = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899'];
        return {
            label: site,
            data: data.data.map(d => d.prices[site]?.price || null),
            borderColor: colors[index % colors.length],
            backgroundColor: colors[index % colors.length] + '20',
            tension: 0.4,
            fill: false
        };
    });
    
    priceTrendChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dates,
            datasets: datasets
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'top',
                },
                title: {
                    display: true,
                    text: `${data.game} - ${data.days}日价格趋势`
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: '价格 (USD)'
                    }
                }
            }
        }
    });
}

// 更新价格统计
function updatePriceStats(data) {
    let allPrices = [];
    let minPrice = Infinity;
    let maxPrice = 0;
    let minSite = '';
    let maxSite = '';
    
    data.data.forEach(day => {
        Object.entries(day.prices).forEach(([site, priceInfo]) => {
            const price = priceInfo.price;
            allPrices.push(price);
            
            if (price < minPrice) {
                minPrice = price;
                minSite = site;
            }
            if (price > maxPrice) {
                maxPrice = price;
                maxSite = site;
            }
        });
    });
    
    if (allPrices.length > 0) {
        document.getElementById('min-price').textContent = `$${minPrice.toFixed(2)}`;
        document.getElementById('min-price-site').textContent = minSite;
        document.getElementById('max-price').textContent = `$${maxPrice.toFixed(2)}`;
        document.getElementById('max-price-site').textContent = maxSite;
        document.getElementById('avg-price').textContent = `$${(allPrices.reduce((a, b) => a + b, 0) / allPrices.length).toFixed(2)}`;
    }
}
</script>
{% endblock %}
